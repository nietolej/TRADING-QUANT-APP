strategy_name: "SMA_Cross_OnChain_Confirm"
symbol: "BTC/USDT"
timeframe: "4h"

parameters:
  fast_period: 20
  slow_period: 50
  risk_pct: 1.0
  atr_mult: 2.5

entry_conditions:
  logic: "OR"
  rules:
    - type: "ma_cross"
      fast_period: "fast_period"
      slow_period: "slow_period"
      ma_type: "EMA"
      direction: "bullish"
    - type: "onchain_threshold"
      metric: "usdt_market_cap"
      condition: "increasing"
      lookback_days: 7
      min_change_pct: 0.1

exit_conditions:
  logic: "OR"
  rules:
    - type: "ma_cross"
      fast_period: "fast_period"
      slow_period: "slow_period"
      ma_type: "EMA"
      direction: "bearish"
    - type: "rsi_threshold"
      period: 14
      condition: "above"
      value: 75

risk_management:
  position_sizing:
    method: "fixed_fractional"
    risk_per_trade_pct: "risk_pct"

  stop_loss:
    type: "dynamic" 
    fixed_pct: 2.0
    dynamic_method: "atr"
    atr_period: 14
    atr_multiplier: "atr_mult"

  take_profit:
    type: "fixed"
    fixed_pct: 5.0
    dynamic_method: "risk_reward_ratio"
    risk_reward_ratio: 2.0
